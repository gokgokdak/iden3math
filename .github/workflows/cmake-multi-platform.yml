name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-so-gcc13:
    name: linux-so-gcc13
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake gcc-13 g++-13

      - name: Check GCC toolchain
        run: |
          gcc-13 --version
          g++-13 --version

      - name: Configure
        run: >
          cmake -S . -B build-linux-so
          -DCMAKE_C_COMPILER=gcc-13
          -DCMAKE_CXX_COMPILER=g++-13
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_CXX_TEST=ON

      - name: Build
        run: cmake --build build-linux-so --config Release --target install --parallel

      - name: Run unit tests
        run: ./product/native/linux/bin/iden3math_test

  windows-dll-vs2022:
    name: windows-dll-vs2022
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -S . -B build-windows-dll -G "Visual Studio 17 2022" -DCMAKE_BUILD_TYPE=Release -DBUILD_CXX_TEST=ON

      - name: Build
        run: cmake --build build-windows-dll --config Release --target install --parallel

      - name: Run unit tests
        run: .\product\native\windows\bin\iden3math_test.exe

  python-wheel:
    name: python-wheel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          check-latest: true
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pybind11

      - name: Select cibuildwheel target
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import sys
          print(f"CIBW_BUILD=cp{sys.version_info.major}{sys.version_info.minor}-*")
          PY

      - name: Build wheel
        run: python build_whl.py -DCMAKE_BUILD_TYPE=Release

      - name: Select wheel for current platform
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          from pathlib import Path
          from pip._vendor.packaging.tags import sys_tags
          from pip._vendor.packaging.utils import parse_wheel_filename

          wheels = sorted(Path("product/wheel").glob("*.whl"))
          supported_tags = set(sys_tags())
          matches = []

          for wheel in wheels:
              _, _, _, wheel_tags = parse_wheel_filename(wheel.name)
              if wheel_tags & supported_tags:
                  matches.append(wheel)

          if len(matches) != 1:
              raise SystemExit(
                  "Expected exactly one wheel matching the current interpreter/platform, "
                  f"got {len(matches)}: {[wheel.name for wheel in matches]} "
                  f"(all wheels: {[wheel.name for wheel in wheels]})"
              )

          print(f"PYTHON_WHEEL={matches[0].as_posix()}")
          PY

      - name: Install selected wheel
        shell: bash
        run: |
          find test/py -maxdepth 1 \( -name '*.so' -o -name '*.pyd' \) -delete
          python -m pip install --force-reinstall "${PYTHON_WHEEL}"

      - name: Run unit tests
        working-directory: test/py
        run: python -m unittest

  wasm-npm-emscripten-latest:
    name: wasm-npm-emscripten-latest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: latest
          check-latest: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git

      - name: Install Emscripten SDK
        shell: bash
        run: |
          git clone https://github.com/emscripten-core/emsdk.git "${HOME}/emsdk"
          cd "${HOME}/emsdk"
          EMSDK_QUIET=1 ./emsdk install latest
          EMSDK_QUIET=1 ./emsdk activate latest

      - name: Configure
        shell: bash
        run: |
          source "${HOME}/emsdk/emsdk_env.sh"
          emcmake cmake -S . -B build-wasm-npm -DCMAKE_BUILD_TYPE=Release -DBUILD_WASM=ON

      - name: Build
        shell: bash
        run: |
          source "${HOME}/emsdk/emsdk_env.sh"
          cmake --build build-wasm-npm --config Release --target install --parallel
          test -f ./product/javascript/npm/dist/index.mjs
          test -f ./product/javascript/npm/package.json

      - name: Run unit tests
        shell: bash
        run: |
          node --test test/js/*.test.mjs
